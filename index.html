<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIA RDC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>🚀 NIA RDC</h2>
</header>

<main>

<!-- HOME -->
<section id="home" class="page active">

  <div id="authBox">
    <h3>Bienvenue</h3>

    <button onclick="go('login')">Connexion</button>
    <button onclick="go('register')">Inscription</button>
  </div>

  <div id="appBox" style="display:none;">
    <h3>Accueil</h3>

    <button onclick="go('publish')">Publier</button>
    <button onclick="go('home')">Home</button>

    <hr>

    <div id="feed"></div>
  </div>

</section>

<!-- LOGIN -->
<section id="login" class="page" style="display:none;">
  <h2>Connexion</h2>

  <input id="login_tel" placeholder="Téléphone">
  <input id="login_pass" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>
  <button onclick="go('home')">Retour</button>
</section>

<!-- REGISTER -->
<section id="register" class="page" style="display:none;">
  <h2>Inscription</h2>

  <input id="reg_tel" placeholder="Téléphone">
  <input id="reg_pass" type="password" placeholder="Mot de passe">

  <button onclick="register()">Créer compte</button>
  <button onclick="go('home')">Retour</button>
</section>

<!-- PUBLISH -->
<section id="publish" class="page" style="display:none;">
  <h2>Publier</h2>

  <input id="titre" placeholder="Titre">
  <textarea id="desc"></textarea>

  <input id="prix" type="number">

  <select id="prix_type">
    <option value="location">Location</option>
    <option value="jour">Jour</option>
    <option value="heure">Heure</option>
    <option value="mois">Mois</option>
  </select>

  <input id="ville">
  <input id="quartier">
  <input id="telephone">

  <select id="disponibilite">
    <option value="disponible">Disponible</option>
    <option value="occupe">Occupé</option>
  </select>

  <input id="image" type="file" multiple>

  <button onclick="publier()">Publier</button>
  <button onclick="go('home')">Retour</button>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
