<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NIA RDC</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#111;color:#fff;padding:10px;text-align:center}
.container{padding:10px}

.card{background:#fff;margin:10px 0;padding:10px;border-radius:10px}

input,textarea{width:100%;padding:10px;margin:5px 0}

button{width:100%;padding:10px;background:#000;color:#fff;border:none}

.vip{color:gold;font-weight:bold}
</style>
</head>

<body>

<header>NIA RDC 🚀</header>

<div class="container">

<!-- AUTH -->
<input id="tel" placeholder="Téléphone">
<input id="pass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>

<p id="me"></p>

<hr>

<!-- CREATE -->
<h3>Publier</h3>

<input id="titre">
<textarea id="desc"></textarea>

<input id="prix_jour">
<input id="ville">
<input id="categorie">
<textarea id="cond"></textarea>

<input id="cphone">
<input id="cname">

<button onclick="create()">Publier</button>

<hr>

<div id="list"></div>

</div>

<script>

const API="http://localhost:5000";
let user=null;

function register(){
fetch(API+"/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
});
}

function login(){
fetch(API+"/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
})
.then(r=>r.json())
.then(u=>{
user=u;
me.innerHTML="Connecté "+u.telephone+(u.is_vip?" VIP":"");
load();
});
}

function create(){
fetch(API+"/annonces",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:user.id,
titre:titre.value,
description:desc.value,
prix_jour:prix_jour.value,
ville:ville.value,
categorie:categorie.value,
conditions_location:cond.value,
contact_phone:cphone.value,
contact_name:cname.value
})
}).then(()=>load());
}

function load(){
fetch(API+"/annonces")
.then(r=>r.json())
.then(d=>{
list.innerHTML="";
d.forEach(a=>{
list.innerHTML+=`
<div class="card">
<h3>${a.titre}</h3>
<p>${a.description}</p>
<b>${a.prix_jour}</b>
<p>${a.ville}</p>
</div>`;
});
});
}

load();

</script>

</body>
</html>
