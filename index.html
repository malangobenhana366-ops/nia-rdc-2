<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIA RDC</title>

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>

<body>

<!-- HEADER MINIMAL -->
<header>
  <div id="logo" onmousedown="startAdminHold()" onmouseup="stopAdminHold()">
    NIA RDC 🚀
  </div>

  <div>
    <button onclick="goLogin()">Connexion</button>
    <button onclick="goRegister()">Inscription</button>
  </div>
</header>

<!-- FEED (HOME ONLY) -->
<section id="home" class="page">
  <h3>📦 Annonces</h3>
  <div id="feed"></div>
</section>

<!-- LOGIN -->
<section id="login" class="page hidden">
  <h3>Connexion</h3>
  <input id="login_tel" placeholder="Téléphone">
  <input id="login_pass" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</section>

<!-- REGISTER -->
<section id="register" class="page hidden">
  <h3>Inscription</h3>
  <input id="reg_tel" placeholder="Téléphone">
  <input id="reg_pass" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer compte</button>
</section>

<!-- PUBLISH -->
<section id="publish" class="page hidden">
  <h3>Publier</h3>

  <input id="titre" placeholder="Titre">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="ville" placeholder="Ville">
  <input id="categorie" placeholder="Catégorie">
  <input id="image" placeholder="Image URL">

  <button onclick="publier()">Publier annonce</button>
</section>

<!-- ADMIN (CACHÉ) -->
<section id="admin" class="page hidden">
  <h3>ADMIN PANEL</h3>

  <input id="admin_code" placeholder="Code admin">
  <button onclick="checkAdmin()">Entrer</button>
</section>

</body>
</html>
