<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NIA RDC</title>
</head>

<body>

<header>
  <h2>NIA RDC</h2>

  <button onclick="go('home')">Home</button>
  <button onclick="go('publish')">Publier</button>
  <button onclick="go('login')">Login</button>
  <button onclick="go('register')">Register</button>
</header>

<main>

<section id="home">
  <div id="feed"></div>
</section>

<section id="login" style="display:none;">
  <input id="login_tel" placeholder="tel">
  <input id="login_pass" type="password">
  <button onclick="login()">Login</button>
</section>

<section id="register" style="display:none;">
  <input id="reg_tel" placeholder="tel">
  <input id="reg_pass" type="password">
  <button onclick="register()">Register</button>
</section>

<section id="publish" style="display:none;">
  <input id="titre" placeholder="titre">
  <textarea id="desc"></textarea>

  <input id="prix" type="number">

  <input id="ville" placeholder="ville">
  <input id="quartier" placeholder="quartier">
  <input id="telephone" placeholder="tel">

  <input id="image" type="file" multiple>

  <button onclick="publier()">Publier</button>
</section>

<section id="detail" style="display:none;"></section>

<script src="app.js"></script>

</main>

</body>
</html>
