<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin - NIA RDC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.container{
  padding:15px;
}

.card{
  background:#222;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

h2{
  margin:10px 0;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.danger{background:red;color:#fff}
.primary{background:#2979ff;color:#fff}
.success{background:#00c853;color:#fff}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Admin Login</h2>

<input id="code" placeholder="Code admin">
<button class="primary" onclick="login()">Connexion</button>

<div id="panel" style="display:none">

<h2>📊 Stats</h2>
<div class="card" id="stats"></div>

<h2>👤 Users</h2>
<div id="users"></div>

<h2>📢 Annonces</h2>
<div id="annonces"></div>

</div>

</div>

<script>

const API = "http://localhost:5000/api";

async function login(){

  const code = document.getElementById("code").value;

  const res = await fetch(API + "/admin/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({code})
  });

  const data = await res.json();

  if(!data.success){
    alert("Code invalide");
    return;
  }

  document.getElementById("panel").style.display = "block";

  loadStats();
  loadUsers();
  loadAnnonces();
}

/*
========================================
STATS
========================================
*/
async function loadStats(){

  const res = await fetch(API + "/admin/stats");
  const data = await res.json();

  document.getElementById("stats").innerHTML = `
    Users: ${data.users}<br>
    Annonces: ${data.annonces}<br>
    VIP: ${data.vip}<br>
    Views: ${data.views}
  `;
}

/*
========================================
USERS
========================================
*/
async function loadUsers(){

  const res = await fetch(API + "/admin/users");
  const data = await res.json();

  document.getElementById("users").innerHTML = data.map(u => `
    <div class="card">
      ${u.telephone} - VIP: ${u.is_vip}
    </div>
  `).join("");
}

/*
========================================
ANNONCES
========================================
*/
async function loadAnnonces(){

  const res = await fetch(API + "/admin/annonces");
  const data = await res.json();

  document.getElementById("annonces").innerHTML = data.map(a => `
    <div class="card">
      <b>${a.titre}</b><br>
      ${a.ville}<br><br>

      <button class="danger" onclick="deleteAnnonce(${a.id})">
        Supprimer
      </button>
    </div>
  `).join("");
}

/*
========================================
DELETE ANNONCE
========================================
*/
async function deleteAnnonce(id){

  await fetch(API + "/admin/annonce/" + id, {
    method:"DELETE"
  });

  loadAnnonces();
}

</script>

</body>
</html>
