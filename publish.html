<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publier une annonce - NIA RDC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

.container{
  padding:15px;
}

h2{
  margin-bottom:10px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.publish{
  background:#00c853;
  color:#fff;
}

.draft{
  background:#2979ff;
  color:#fff;
  margin-top:10px;
}

.preview{
  margin-top:10px;
  padding:10px;
  background:#fff;
  border-radius:8px;
}

small{
  color:#666;
}
</style>

</head>

<body>

<div class="container">

<h2>Publier une annonce</h2>

<input id="titre" placeholder="Titre de l'annonce">

<textarea id="description" placeholder="Description"></textarea>

<select id="categorie">
  <option>Matériel</option>
  <option>Service</option>
  <option>Événement</option>
  <option>Autre</option>
</select>

<input id="prix_jour" placeholder="Prix par jour">

<input id="ville" placeholder="Ville">
<input id="commune" placeholder="Commune">
<input id="quartier" placeholder="Quartier">

<textarea id="conditions" placeholder="Conditions de location"></textarea>

<input id="contact_nom" placeholder="Nom du contact">
<input id="contact_tel" placeholder="Téléphone du contact">

<input type="file" id="image">

<small>Standard: 3 images max | VIP: illimité</small>

<button class="publish" onclick="publier()">Publier</button>
<button class="draft" onclick="brouillon()">Enregistrer brouillon</button>

<div class="preview" id="preview"></div>

</div>

<script>

const API = "http://localhost:5000/api";

async function uploadImage(file){

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("http://localhost:5000/upload", {
    method:"POST",
    body:formData
  });

  const data = await res.json();
  return data.url;
}

async function publier(){

  const file = document.getElementById("image").files[0];

  let imageUrl = "";

  if(file){
    imageUrl = await uploadImage(file);
  }

  const payload = {
    user_id: localStorage.getItem("user_id"),
    titre: document.getElementById("titre").value,
    description: document.getElementById("description").value,
    categorie: document.getElementById("categorie").value,
    prix_jour: document.getElementById("prix_jour").value,
    ville: document.getElementById("ville").value,
    commune: document.getElementById("commune").value,
    quartier: document.getElementById("quartier").value,
    conditions_location: document.getElementById("conditions").value,
    contact_nom: document.getElementById("contact_nom").value,
    contact_tel: document.getElementById("contact_tel").value,
    image_url: imageUrl,
    statut: "published"
  };

  const res = await fetch(API + "/annonces", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  document.getElementById("preview").innerHTML =
    "Annonce publiée avec succès ID: " + data.id;
}

function brouillon(){

  alert("Brouillon sauvegardé (logique backend à activer ensuite)");
}

</script>

</body>
</html>
