<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NIA RDC</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#111;color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

/* CONTAINER */
.container{padding:10px}

/* CARDS */
.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* INPUTS */
input,textarea,select{
width:100%;
padding:10px;
margin:5px 0;
}

/* BUTTON */
button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
margin-top:5px;
cursor:pointer;
}

/* VIP TAG */
.vip{
color:gold;
font-weight:bold;
}

/* BANNER ADS */
#banner{
position:fixed;
bottom:0;
width:100%;
background:#ddd;
text-align:center;
padding:8px;
}
</style>

</head>

<body>

<header>NIA RDC 🚀 Marketplace</header>

<div class="container">

<!-- AUTH -->
<h3>Connexion</h3>
<input id="tel" placeholder="Téléphone">
<input id="pass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>

<p id="me"></p>

<hr>

<!-- CREATE -->
<h3>Publier annonce</h3>

<input id="titre" placeholder="Titre">
<textarea id="desc" placeholder="Description"></textarea>

<input id="prix_jour" placeholder="Prix jour">
<input id="prix_heure" placeholder="Prix heure">
<input id="prix_semaine" placeholder="Prix semaine">
<input id="prix_mois" placeholder="Prix mois">

<input id="ville" placeholder="Ville">
<input id="commune" placeholder="Commune">
<input id="quartier" placeholder="Quartier">

<input id="categorie" placeholder="Catégorie">

<textarea id="conditions" placeholder="Conditions de location"></textarea>

<input id="contact_phone" placeholder="Téléphone contact">
<input id="contact_name" placeholder="Nom contact">

<button onclick="create()">Publier</button>

<hr>

<!-- LIST -->
<div id="list"></div>

</div>

<div id="banner">AdSense Banner Fixed</div>

<script>

const API="http://localhost:5000";
let user=null;

// ======================
// REGISTER
// ======================
function register(){
fetch(API+"/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
}).then(r=>r.json()).then(d=>{
alert("Compte créé");
});
}

// ======================
// LOGIN
// ======================
function login(){
fetch(API+"/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
}).then(r=>r.json()).then(u=>{
user=u;
me.innerHTML = "Connecté: " + u.telephone + (u.is_vip ? " <span class='vip'>VIP</span>" : "");
load();
});
}

// ======================
// CREATE ANNONCE
// ======================
function create(){
if(!user) return alert("Connecte-toi");

fetch(API+"/annonces",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:user.id,
titre:titre.value,
description:desc.value,

prix_jour:prix_jour.value,
prix_heure:prix_heure.value,
prix_semaine:prix_semaine.value,
prix_mois:prix_mois.value,

ville:ville.value,
commune:commune.value,
quartier:quartier.value,

categorie:categorie.value,
conditions_location:conditions.value,

contact_phone:contact_phone.value,
contact_name:contact_name.value,

status:"disponible"
})
}).then(()=>load());
}

// ======================
// LOAD ANNONCES
// ======================
function load(){
fetch(API+"/annonces")
.then(r=>r.json())
.then(d=>{
list.innerHTML="";
d.forEach(a=>{
list.innerHTML+=`
<div class="card">
<h3>${a.titre}</h3>
<p>${a.description}</p>

<p><b>${a.prix_jour || 0}$ / jour</b></p>

<p>${a.ville} - ${a.commune}</p>

<p>Status: ${a.status}</p>

<p>${a.conditions_location || ""}</p>

</div>`;
});
});
}

load();

</script>

</body>
</html>
