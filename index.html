<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NIA RDC</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}

header{background:#111;color:white;padding:10px;text-align:center}

.container{padding:10px}

.card{background:white;margin:10px 0;padding:10px;border-radius:8px}

input,textarea{width:100%;margin:5px 0;padding:10px}

button{width:100%;padding:10px;background:black;color:white;border:none}

#banner{
position:fixed;bottom:0;width:100%;background:#ddd;text-align:center;padding:8px
}
</style>
</head>

<body>

<header>NIA RDC 🚀</header>

<div class="container">

<!-- AUTH -->
<h3>Connexion</h3>
<input id="tel" placeholder="Téléphone">
<input id="pass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>

<p id="me"></p>

<hr>

<!-- CREATE -->
<h3>Publier annonce</h3>

<input id="titre" placeholder="Titre">
<textarea id="desc"></textarea>
<input id="prix" placeholder="Prix jour">
<input id="ville" placeholder="Ville">
<input id="cat" placeholder="Catégorie">
<textarea id="cond" placeholder="Conditions"></textarea>

<input id="cphone" placeholder="Contact phone">
<input id="cname" placeholder="Contact name">

<button onclick="create()">Publier</button>

<hr>

<!-- LIST -->
<div id="list"></div>

</div>

<div id="banner">AdSense Banner (fixed bottom)</div>

<script>

const API="http://localhost:5000";
let user=null;

function register(){
fetch(API+"/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
}).then(r=>r.json()).then(console.log);
}

function login(){
fetch(API+"/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telephone:tel.value,
password:pass.value
})
}).then(r=>r.json()).then(u=>{
user=u;
me.innerText="Connecté: "+u.telephone;
load();
});
}

function create(){
if(!user)return alert("login first");

fetch(API+"/annonces",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:user.id,
titre:titre.value,
description:desc.value,
prix_jour:prix.value,
ville:ville.value,
categorie:cat.value,
conditions_location:cond.value,
contact_phone:cphone.value,
contact_name:cname.value,
status:"disponible"
})
}).then(()=>load());
}

function load(){
fetch(API+"/annonces")
.then(r=>r.json())
.then(d=>{
list.innerHTML="";
d.forEach(a=>{
list.innerHTML+=`
<div class="card">
<h3>${a.titre}</h3>
<p>${a.description}</p>
<b>${a.prix_jour}$/jour</b>
<p>${a.ville}</p>
</div>`;
});
});
}

load();

</script>

</body>
</html>
