<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Publish</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
.container{padding:15px}
input,textarea,select{width:100%;padding:10px;margin-bottom:10px}
button{width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold}
.publish{background:#00c853;color:#fff}
</style>

</head>

<body>

<div class="container">

<h2>Publier</h2>

<input id="titre" placeholder="Titre">
<textarea id="desc" placeholder="Description"></textarea>

<select id="cat">
<option>Matériel</option>
<option>Service</option>
<option>Autre</option>
</select>

<input id="prix" placeholder="Prix">
<input id="ville" placeholder="Ville">

<textarea id="cond" placeholder="Conditions de location"></textarea>

<input type="file" id="img">

<button class="publish" onclick="send()">Publier</button>

</div>

<script>

const API = "https://nia-backend.onrender.com/api";

async function upload(file){

  const fd = new FormData();
  fd.append("image", file);

  const res = await fetch("https://nia-backend.onrender.com/upload", {
    method:"POST",
    body:fd
  });

  return await res.json();
}

async function send(){

  const file = document.getElementById("img").files[0];

  let imgUrl = "";

  if(file){
    const up = await upload(file);
    imgUrl = up.url;
  }

  await fetch(API + "/annonces", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      titre: document.getElementById("titre").value,
      description: document.getElementById("desc").value,
      categorie: document.getElementById("cat").value,
      prix_jour: document.getElementById("prix").value,
      ville: document.getElementById("ville").value,
      conditions_location: document.getElementById("cond").value,
      image_url: imgUrl,
      user_id: localStorage.getItem("user_id"),
      statut:"published"
    })
  });

  alert("Annonce publiée");
}

</script>

</body>
</html>
