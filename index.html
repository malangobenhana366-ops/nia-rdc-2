<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIA RDC</title>

  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>

<body>

<header>
  <h2>NIA RDC 🚀</h2>

  <div class="nav">
    <button onclick="showFeed()">Accueil</button>
    <button onclick="showLogin()">Connexion</button>
    <button onclick="showRegister()">Inscription</button>
    <button onclick="showPublish()">Publier</button>
  </div>
</header>

<!-- FEED -->
<div class="container" id="feedBox">
  <h3>📦 Annonces récentes</h3>
  <div id="feed"></div>
</div>

<!-- LOGIN -->
<div class="container hidden" id="loginBox">
  <h3>Connexion</h3>
  <input id="login_tel" placeholder="Téléphone">
  <input id="login_pass" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- REGISTER -->
<div class="container hidden" id="registerBox">
  <h3>Inscription</h3>
  <input id="reg_tel" placeholder="Téléphone">
  <input id="reg_pass" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer compte</button>
</div>

<!-- PUBLISH -->
<div class="container hidden" id="publishBox">
  <h3>Publier annonce</h3>

  <input id="titre" placeholder="Titre">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="ville" placeholder="Ville">
  <input id="categorie" placeholder="Catégorie">
  <input id="image" placeholder="URL image">

  <button onclick="publier()">Publier</button>
</div>

</body>
</html>
