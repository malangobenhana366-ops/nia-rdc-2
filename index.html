<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NIA RDC</title>

  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>

<body>

<header>
  <div class="logo">NIA RDC 🚀</div>

  <div class="admin-gear"
       onmousedown="adminHoldStart()"
       onmouseup="adminHoldStop()">
    ⚙️
  </div>
</header>

<nav class="nav">
  <button onclick="go('home')">Accueil</button>
  <button onclick="go('login')">Connexion</button>
  <button onclick="go('register')">Inscription</button>
  <button onclick="go('publish')">Publier</button>
</nav>

<!-- HOME -->
<section id="home" class="page">
  <h2>📦 Annonces</h2>
  <div id="feed"></div>
</section>

<!-- LOGIN -->
<section id="login" class="page hidden">
  <h2>Connexion</h2>

  <input id="login_tel" placeholder="Téléphone"/>
  <input id="login_pass" type="password" placeholder="Mot de passe"/>

  <button class="primary" onclick="login()">Se connecter</button>
</section>

<!-- REGISTER -->
<section id="register" class="page hidden">
  <h2>Créer compte</h2>

  <input id="reg_tel" placeholder="Téléphone"/>
  <input id="reg_pass" type="password" placeholder="Mot de passe"/>

  <button class="primary" onclick="register()">S'inscrire</button>
</section>

<!-- PUBLISH -->
<section id="publish" class="page hidden">
  <h2>Publier une annonce</h2>

  <input id="titre" placeholder="Titre"/>
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="ville" placeholder="Ville"/>
  <input id="categorie" placeholder="Catégorie"/>
  <input id="image" placeholder="Image URL"/>

  <button class="primary" onclick="publier()">Publier</button>
</section>

<!-- ADMIN -->
<section id="admin" class="page hidden">
  <h2>Admin Access</h2>

  <input id="admin_code" placeholder="Code admin"/>

  <button class="primary" onclick="checkAdmin()">Valider</button>
</section>

</body>
</html>
