<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIA RDC</title>

<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
</head>

<body>

<header>
  <div class="logo">NIA RDC 🚀</div>
  <div class="gear" onmousedown="adminHoldStart()" onmouseup="adminHoldStop()">⚙️</div>
</header>

<nav>
  <button onclick="go('home')">Accueil</button>
  <button onclick="go('login')">Connexion</button>
  <button onclick="go('register')">Inscription</button>
  <button onclick="go('publish')">Publier</button>
</nav>

<section id="home" class="page">
  <div id="feed"></div>
</section>

<section id="login" class="page hidden">
  <input id="login_tel" placeholder="Téléphone">
  <input id="login_pass" type="password" placeholder="Mot de passe">
  <button onclick="login()">Connexion</button>
</section>

<section id="register" class="page hidden">
  <input id="reg_tel" placeholder="Téléphone">
  <input id="reg_pass" type="password">
  <button onclick="register()">Créer compte</button>
</section>

<section id="publish" class="page hidden">
  <input id="titre" placeholder="Titre">
  <textarea id="desc"></textarea>
  <input id="ville">
  <input id="categorie">
  <input id="imageFile" type="file">
  <button onclick="publier()">Publier</button>
</section>

<section id="admin" class="page hidden">
  <input id="admin_code">
  <button onclick="checkAdmin()">OK admin</button>
</section>

</body>
</html>
