<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIA RDC</title>
</head>

<body>

<header>
  <h2>🚀 NIA RDC</h2>

  <!-- MENU FIXE -->
  <div>
    <button onclick="go('home')">Home</button>
    <button onclick="go('publish')">Publier</button>
    <button onclick="go('search')">Rechercher</button>
    <button onclick="go('profile')">Profil</button>
  </div>
</header>

<main>

<!-- HOME -->
<section id="home">
  <h3>Annonces</h3>
  <div id="feed"></div>
</section>

<!-- LOGIN -->
<section id="login" style="display:none;">
  <h2>Connexion</h2>

  <input id="login_tel" placeholder="Téléphone">
  <input id="login_pass" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>
  <button onclick="go('home')">Retour</button>
</section>

<!-- REGISTER -->
<section id="register" style="display:none;">
  <h2>Inscription</h2>

  <input id="reg_tel" placeholder="Téléphone">
  <input id="reg_pass" type="password">

  <button onclick="register()">Créer compte</button>
  <button onclick="go('home')">Retour</button>
</section>

<!-- PUBLISH (RESTAURÉ COMPLET) -->
<section id="publish" style="display:none;">
  <h2>Publier une annonce</h2>

  <input id="titre" placeholder="Titre">
  <textarea id="desc" placeholder="Description"></textarea>

  <input id="prix" type="number">

  <select id="prix_type">
    <option value="location">Location</option>
    <option value="heure">Heure</option>
    <option value="jour">Jour</option>
    <option value="mois">Mois</option>
  </select>

  <input id="ville" placeholder="Ville">
  <input id="quartier" placeholder="Quartier">
  <input id="telephone" placeholder="Téléphone">

  <select id="disponibilite">
    <option value="disponible">Disponible</option>
    <option value="occupe">Occupé</option>
  </select>

  <input id="image" type="file" multiple>

  <button onclick="publier()">Publier</button>
  <button onclick="go('home')">Retour</button>
</section>

<!-- DETAIL COMPLET -->
<section id="detail" style="display:none;"></section>

<!-- SEARCH -->
<section id="search" style="display:none;">
  <h2>Recherche</h2>
  <input placeholder="chercher...">
</section>

<!-- PROFILE -->
<section id="profile" style="display:none;">
  <h2>Profil</h2>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
