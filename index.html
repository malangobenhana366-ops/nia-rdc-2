<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIA RDC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">🚀 NIA RDC</div>
</header>

<main>

<section id="publish" class="page active">

  <h2>➕ Publier une annonce</h2>

  <input id="titre" placeholder="Titre *">

  <textarea id="desc" placeholder="Description (optionnel)"></textarea>

  <input id="prix" type="number" placeholder="Prix (optionnel)">

  <!-- prix type -->
  <select id="prix_type">
    <option value="vente">Vente</option>
    <option value="heure">Par heure</option>
    <option value="jour">Par jour</option>
    <option value="semaine">Par semaine</option>
    <option value="mois">Par mois</option>
  </select>

  <input id="ville" placeholder="Ville (optionnel)">
  <input id="quartier" placeholder="Quartier (optionnel)">
  <input id="telephone" placeholder="Téléphone (optionnel)">

  <!-- disponibilité -->
  <select id="disponibilite">
    <option value="disponible">Disponible</option>
    <option value="occupe">Occupé</option>
  </select>

  <h3>📷 Images</h3>
  <input id="image" type="file" accept="image/*" multiple>

  <br><br>

  <button onclick="publier()">Publier 🚀</button>

</section>

<section>
  <h2>Feed</h2>
  <div id="feed"></div>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
