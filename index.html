<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIA RDC</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f4f4f4;
    }

    header{
      background:#111;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    header h2{
      margin:0;
      font-size:18px;
      letter-spacing:1px;
    }

    nav button{
      margin:5px;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    main{
      padding:15px;
    }

    section{
      display:none;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:5px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:6px;
      background:#111;
      color:white;
      cursor:pointer;
      margin-top:5px;
    }

    button:hover{
      opacity:0.8;
    }

    /* FEED */
    #feed{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      cursor:pointer;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card h3{
      margin:10px;
      font-size:16px;
    }

    /* DETAIL */
    #detail{
      background:white;
      padding:15px;
      border-radius:10px;
    }

    #gallery img{
      border-radius:8px;
    }

  </style>
</head>

<body>

<header>
  <h2>🚀 NIA RDC</h2>

  <nav>
    <button onclick="go('home')">🏠 Home</button>
    <button onclick="go('publish')">➕ Publier</button>
    <button onclick="go('login')">🔐 Login</button>
    <button onclick="go('register')">📝 Register</button>
  </nav>
</header>

<main>

  <!-- HOME -->
  <section id="home">
    <h3>📢 Annonces récentes</h3>
    <div id="feed"></div>
  </section>

  <!-- LOGIN -->
  <section id="login">
    <h3>🔐 Connexion</h3>
    <input id="login_tel" placeholder="Téléphone">
    <input id="login_pass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </section>

  <!-- REGISTER -->
  <section id="register">
    <h3>📝 Inscription</h3>
    <input id="reg_tel" placeholder="Téléphone">
    <input id="reg_pass" type="password" placeholder="Mot de passe">
    <button onclick="register()">Créer compte</button>
  </section>

  <!-- PUBLISH -->
  <section id="publish">
    <h3>➕ Publier une annonce</h3>

    <input id="titre" placeholder="Titre">
    <textarea id="desc" placeholder="Description"></textarea>

    <input id="prix" type="number" placeholder="Prix">
    <input id="ville" placeholder="Ville">
    <input id="quartier" placeholder="Quartier">
    <input id="telephone" placeholder="Téléphone">

    <input id="image" type="file" multiple>

    <button onclick="publier()">📤 Publier</button>
  </section>

  <!-- DETAIL -->
  <section id="detail"></section>

</main>

<script src="app.js"></script>

</body>
</html>
