<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDC Maison et Appart Rapide</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --background: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: var(--background); color: var(--text); padding-bottom: 60px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px; position: sticky; top: 0; z-index: 50; }
    .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.3rem; font-weight: bold; color: var(--primary); text-decoration: none; }
    
    .main-container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    
    /* MODALS SYSTEM */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--surface); padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); position: relative; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .modal-header button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }

    /* FILTRES & FORMULAIRES */
    .search-box { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; }
    
    /* CARTES ANNONCES */
    .grid-annonces { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
    .card.vip { border: 2px solid #eab308; box-shadow: 0 4px 6px -1px rgba(234, 179, 8, 0.1); }
    .badge-vip { position: absolute; top: 10px; right: 10px; background: #eab308; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
    .card-content { padding: 15px; flex: 1; display: flex; flex-direction: column; }
    .card-price { font-size: 1.25rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
    
    /* NAVIGATION BASSE MOBILE */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 90; }
    .nav-item { border: none; background: none; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; }
    .nav-item.active { color: var(--primary); font-weight: bold; }

    /* BOUTONS UTILITAIRES */
    .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; text-align: center; display: inline-block; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-auth { background: #475569; color: white; padding: 10px; border-radius: 6px; border: none; cursor: pointer; }
    
    /* ALERTES NOTIFICATIONS ACCUEIL */
    #boite-alertes-globales { max-width: 1200px; margin: 10px auto; padding: 0 15px; }
    .alerte-item { background: #fee2e2; border-left: 4px solid var(--danger); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="#" class="logo">🏠 RDC Maison Express</a>
      <button class="btn btn-primary" onclick="ouvrirModal('auth')">Mon Compte / Connexion</button>
    </div>
  </header>

  <div id="boite-alertes-globales"></div>

  <main class="main-container">
    <div class="search-box">
      <input type="text" id="filtre-commune" class="form-control" placeholder="Quelle commune / Ville ?">
      <select id="filtre-type" class="form-control">
        <option value="">Tous les types</option>
        <option value="Maison">Maison</option>
        <option value="Appartement">Appartement</option>
      </select>
      <select id="filtre-categorie" class="form-control">
        <option value="">Toutes les offres</option>
        <option value="Standard">Standard</option>
        <option value="VIP">VIP Platinum ⭐</option>
      </select>
      <button class="btn btn-primary" onclick="filtrerCatalogue()">Rechercher</button>
    </div>

    <div class="grid-annonces" id="catalogue-box"></div>
  </main>

  <div class="modal" id="modal-legal-display">
    <div class="modal-content" style="max-width: 650px; width: 90%; max-height: 85vh; display: flex; flex-direction: column;">
      <div class="modal-header">
        <h3 id="legal-header-title" style="margin:0; color: var(--primary);"></h3>
        <button onclick="fermerModal('legal-display')">✕</button>
      </div>
      <div id="legal-body-content" style="white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: var(--text); overflow-y: auto; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border); flex: 1; margin-top: 10px;"></div>
    </div>
  </div>

  <div class="modal" id="modal-admin">
    <div class="modal-content" style="background:#0f172a; color:white; max-width:600px;">
      <div class="modal-header" style="border-bottom:1px solid #334155;">
        <h3 style="margin:0; color:#ef4444;">Supervision Centrale</h3>
        <button onclick="fermerModal('admin')" style="background:#1e293b; color:white; border:none; padding:4px 8px; border-radius:4px;">✕</button>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px;">
        <button class="btn-auth" onclick="definirVueAdmin('flux')">Annonces En Ligne</button>
        <button class="btn-auth" style="background:var(--danger)" onclick="definirVueAdmin('signaux')">Signalements Actifs</button>
        <button class="btn-auth" style="background:#475569" onclick="definirVueAdmin('reponses_normales')">Messages Classiques</button>
        <button class="btn-auth" style="background:#854d0e" onclick="definirVueAdmin('justifications')">Justifications Reçues 📂</button>
      </div>
      <div style="background:#1e293b; padding:10px; border-radius:6px; margin-bottom:12px;">
        <label style="font-size:0.8rem; font-weight:bold; color:#38bdf8;">Message Flash d'Urgence (Tous les comptes) :</label>
        <textarea id="admin-global-txt" rows="2" style="background:#0f172a; color:white; border:1px solid #334155; margin-top:4px; width:100%; padding:6px; border-radius:4px;"></textarea>
        <button class="btn-auth" style="width:100%; margin-top:4px; padding:6px;" onclick="diffuserNotificationGlobale()">Diffuser l'alerte générale</button>
      </div>
      <div id="admin-main-render-box" style="max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;"></div>
    </div>
  </div>

  <div class="modal" id="modal-auth">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Espace Bailleur Sécurisé</h3>
        <button onclick="fermerModal('auth')">✕</button>
      </div>
      <div class="form-group">
        <label>Numéro de téléphone (WhatsApp)</label>
        <input type="tel" id="auth-tel" class="form-control" placeholder="Ex: +243812345678">
      </div>
      <div class="form-group">
        <label>Code PIN secret (4 chiffres)</label>
        <input type="password" id="auth-pin" class="form-control" maxlength="4" placeholder="••••">
      </div>
      <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="authentifierBailleur()">Se connecter / S'enregistrer</button>
      
      <div id="zone-gestion-bailleur" style="display:none; margin-top: 20px; border-top: 2px dashed var(--border); padding-top: 15px;">
        <h4 style="margin-bottom:10px;">Publier une nouvelle offre</h4>
        <div class="form-group">
          <input type="text" id="add-titre" class="form-control" placeholder="Titre (Ex: Bel Appartement Moderne)">
        </div>
        <div class="form-group">
          <input type="text" id="add-adresse" class="form-control" placeholder="Adresse complète (ex: Réf, Arrêt, N°)">
        </div>
        <div class="form-group">
          <input type="text" id="add-commune" class="form-control" placeholder="Commune / Ville">
        </div>
        <div class="form-group">
          <input type="number" id="add-prix" class="form-control" placeholder="Prix Mensuel ($ USD)">
        </div>
        <div class="form-group">
          <select id="add-type" class="form-control">
            <option value="Maison">Maison</option>
            <option value="Appartement">Appartement</option>
          </select>
        </div>
        <div class="form-group">
          <select id="add-categorie" class="form-control">
            <option value="Standard">Standard (Max 3 chambres)</option>
            <option value="VIP">VIP Platinum ⭐ (Illimité + Boost)</option>
          </select>
        </div>
        <button class="btn btn-primary" style="background:var(--success); width:100%;" onclick="creerNouvelleAnnonce()">Mettre l'annonce en ligne</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="changerOngletPrincipal('accueil')"><span>🏠</span>Accueil</button>
    <button class="nav-item" onclick="ouvrirModal('auth')"><span>➕</span>Publier</button>
    <button class="nav-item" onclick="chargerTextesLegaux('propos')"><span>ℹ️</span>À propos</button>
    <button class="nav-item" onclick="chargerTextesLegaux('confidentialite')"><span>🔒</span>Confidentialité</button>
    <button class="nav-item" onclick="ouvrirModal('admin')" style="color:var(--danger)"><span>🛠️</span>Admin</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
